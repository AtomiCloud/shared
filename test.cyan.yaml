      - "! grep -RqE 'languages/(typescript|csharp)\\.md' CLAUDE.MD docs .claude/skills"
      - test "$(head -1 CLAUDE.MD)" = "# Code Rules"
      - "! grep -Rq 'let___' ."
    deterministic_state: {}
